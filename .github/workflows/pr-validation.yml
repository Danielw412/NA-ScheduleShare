name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:function
      - run: pnpm test:worker
      - run: pnpm build
      - name: Start local Supabase
        run: pnpm supabase:start
      - name: Reset local database
        run: pnpm db:reset
      - name: Run database tests
        id: database-tests
        shell: bash
        run: |
          set +e
          pnpm test:privacy 2>&1 | tee database-test-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload database test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-output
          path: database-test-output.txt
      - name: Fail when database tests fail
        if: steps.database-tests.outputs.exit_code != '0'
        run: exit 1
      - name: Stop local Supabase
        if: always()
        run: pnpm supabase:stop
