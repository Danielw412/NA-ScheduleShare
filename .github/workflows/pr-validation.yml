name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:function
      - run: pnpm test:worker
      - run: pnpm build
      - name: Start local Supabase
        run: pnpm supabase:start
      - name: Reset local database
        run: pnpm db:reset
      - name: Run database tests
        run: pnpm test:privacy
      - name: Stop local Supabase
        if: always()
        run: pnpm supabase:stop
