name: Diagnose import size patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/import-size-special-teachers
          fetch-depth: 0
      - name: Run patch and capture the exact error
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          source = Path('.github/workflows/apply-import-size-special-teachers-once.yml').read_text()
          block = source.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          Path('/tmp/apply_changes.py').write_text(textwrap.dedent(block))
          PY
          python /tmp/apply_changes.py > patch-error.txt 2>&1
      - name: Commit diagnostic output
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add patch-error.txt
          git commit -m "Record schedule patch failure"
          git push origin HEAD:fix/import-size-special-teachers
      - name: Fail after saving diagnostics
        if: steps.patch.outcome == 'failure'
        run: exit 1
