name: Diagnose schedule function tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
  VITE_SCHEDULE_SHARE_BASE_URL: https://schedule-api.naclubs.net

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/import-size-special-teachers
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Apply patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-import-size-special-teachers-once.yml').read_text()
          block = source.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          strict = "if text.count(old) != 1:\n    raise SystemExit('Could not update teacher input')\ntext = text.replace(old, new)"
          tolerant = "if text.count(old) == 1:\n    text = text.replace(old, new)"
          script = script.replace(strict, tolerant)
          Path('/tmp/apply_changes.py').write_text(script + '\n')
          PY
          python /tmp/apply_changes.py
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/schedule/AddClassDialog.tsx')
          text = path.read_text()
          text = text.replace('<input required maxLength={120} value={teacherLastName} onChange={(event) => setTeacherLastName(event.target.value)} aria-describedby="teacher-last-name-help" />', '<input required={!teacherIsNotApplicable} disabled={teacherIsNotApplicable} maxLength={120} value={effectiveTeacherLastName} onChange={(event) => setTeacherLastName(event.target.value)} aria-describedby="teacher-last-name-help" />')
          text = text.replace('<small id="teacher-last-name-help" className="field-help">Enter only the teacher’s last name. For example, enter Smith instead of Joe Smith.</small>', '<small id="teacher-last-name-help" className="field-help">{teacherIsNotApplicable ? \'Lunch and Study Hall always use N/A for the teacher.\' : \'Enter only the teacher’s last name. For example, enter Smith instead of Joe Smith.\'}</small>')
          path.write_text(text)
          PY
      - run: pnpm install --frozen-lockfile
      - name: Run function tests and capture output
        id: function_tests
        continue-on-error: true
        shell: bash
        run: pnpm test:function > function-test-error.txt 2>&1
      - name: Commit test output
        if: steps.function_tests.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add function-test-error.txt
          git commit -m "Record schedule function test failure"
          git push origin HEAD:fix/import-size-special-teachers
      - name: Fail after capture
        if: steps.function_tests.outcome == 'failure'
        run: exit 1
