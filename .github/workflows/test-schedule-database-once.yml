name: Test schedule database once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  database-tests:
    if: github.event.pull_request.head.ref == 'fix/schedule-semester-import-lunch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/schedule-semester-import-lunch
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase
        run: pnpm supabase:start
      - name: Run database tests
        run: pnpm test:privacy
      - name: Remove one-time workflow
        if: success()
        shell: bash
        run: |
          rm .github/workflows/test-schedule-database-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/test-schedule-database-once.yml
          git commit -m "Remove one-time database test workflow"
          git push origin HEAD:fix/schedule-semester-import-lunch
