name: Test and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SCHEDULE_IMPORT_API_URL: ${{ secrets.VITE_SCHEDULE_IMPORT_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate frontend configuration
        shell: bash
        run: |
          test -n "$VITE_SUPABASE_URL" || { echo "VITE_SUPABASE_URL is not configured" >&2; exit 1; }
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY" || { echo "VITE_SUPABASE_PUBLISHABLE_KEY is not configured" >&2; exit 1; }
          test -n "$VITE_SCHEDULE_IMPORT_API_URL" || { echo "VITE_SCHEDULE_IMPORT_API_URL is not configured" >&2; exit 1; }
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:worker
      - run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
