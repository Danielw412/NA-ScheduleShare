name: Diagnose special course database tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
  VITE_SCHEDULE_SHARE_BASE_URL: https://schedule-api.naclubs.net

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/import-size-special-teachers
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Apply patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-import-size-special-teachers-once.yml').read_text()
          block = source.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          strict = "if text.count(old) != 1:\n    raise SystemExit('Could not update teacher input')\ntext = text.replace(old, new)"
          tolerant = "if text.count(old) == 1:\n    text = text.replace(old, new)"
          script = script.replace(strict, tolerant)
          Path('/tmp/apply_changes.py').write_text(script + '\n')
          PY
          python /tmp/apply_changes.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec supabase start
      - name: Run database tests and capture output
        id: db_tests
        continue-on-error: true
        shell: bash
        run: pnpm test:privacy > database-test-error.txt 2>&1
      - name: Upload database diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-error
          path: database-test-error.txt
      - name: Fail after capture
        if: steps.db_tests.outcome == 'failure'
        run: exit 1
