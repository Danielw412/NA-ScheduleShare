name: Run schedule fix patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.ref == 'fix/schedule-semester-import-lunch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/schedule-semester-import-lunch
          fetch-depth: 0
      - name: Execute the one-time patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-schedule-fixes-once.yml').read_text()
          marker = "          python <<'PY'\n"
          end_marker = "\n          PY\n"
          script = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script.splitlines())
          exec(compile(script, 'apply-schedule-fixes-once.yml', 'exec'))
          Path('.github/workflows/run-schedule-fix-patch.yml').unlink()
          PY
      - name: Commit fixes
        shell: bash
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix semester selector, retry status, and full-year lunch"
          git push origin HEAD:fix/schedule-semester-import-lunch
