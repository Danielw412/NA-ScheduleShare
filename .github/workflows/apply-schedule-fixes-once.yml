name: Apply schedule fixes once

on:
  push:
    branches:
      - fix/schedule-semester-import-lunch
    paths:
      - .github/workflows/apply-schedule-fixes-once.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/schedule-semester-import-lunch
          fetch-depth: 0
      - name: Apply source and test changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {old[:100]!r}")
              file_path.write_text(text.replace(old, new, 1))

          replace_once(
              'src/components/schedule/TermSelector.tsx',
              '<div className="term-selector" role="group" aria-label={label}>',
              '<div className="term-selector" role="group" aria-label={label} style={{ gridTemplateColumns: `repeat(${options.length}, minmax(0, 1fr))` }}>',
          )

          replace_once(
              'src/components/schedule/ScheduleImportDialog.tsx',
              "  const [checkingAgain, setCheckingAgain] = useState(false)\n",
              '',
          )
          replace_once(
              'src/components/schedule/ScheduleImportDialog.tsx',
              "  useEffect(() => {\n    if (phase !== 'processing') {\n      setCheckingAgain(false)\n      return\n    }\n    const timer = window.setTimeout(() => setCheckingAgain(true), progressDurationMs)\n    return () => window.clearTimeout(timer)\n  }, [phase, progressDurationMs])\n\n",
              '',
          )
          replace_once(
              'src/components/schedule/ScheduleImportDialog.tsx',
              "    setCheckingAgain(false)\n",
              '',
          )
          replace_once(
              'src/components/schedule/ScheduleImportDialog.tsx',
              "            {phase === 'processing' ? <div className=\"import-progress\" role=\"status\" aria-live=\"polite\"><div><strong>{checkingAgain ? 'Checking the schedule again…' : 'AI is analyzing your screenshots…'}</strong><small>{checkingAgain ? 'If Gemini found missing classes or conflicts, it is trying again automatically.' : 'Identifying classes, semesters, and A/B-day periods for review.'}</small></div><div className=\"import-progress-track\" role=\"progressbar\" aria-label=\"AI screenshot analysis progress\" style={{ '--import-progress-duration': `${progressDurationMs}ms` } as CSSProperties}><span /></div></div> : null}",
              "            {phase === 'processing' ? <div className=\"import-progress\" role=\"status\" aria-live=\"polite\"><div><strong>AI is analyzing your screenshots…</strong><small>Identifying classes, semesters, and A/B-day periods for review.</small></div><div className=\"import-progress-track\" role=\"progressbar\" aria-label=\"AI screenshot analysis progress\" style={{ '--import-progress-duration': `${progressDurationMs}ms` } as CSSProperties}><span /></div></div> : null}",
          )

          replace_once(
              'src/components/schedule/AddClassDialog.tsx',
              '    <small className="field-help">Using the same lunch period in both semesters will be stored as one full-year entry.</small>',
              '    <small className="field-help">Full Year adds matching Semester 1 and Semester 2 lunch entries at this period.</small>',
          )

          replace_once(
              'src/components/schedule/ScheduleImportDialog.test.tsx',
              "import { cleanup, fireEvent, render, screen, waitFor } from '@testing-library/react'",
              "import { act, cleanup, fireEvent, render, screen, waitFor } from '@testing-library/react'",
          )
          replace_once(
              'src/components/schedule/ScheduleImportDialog.test.tsx',
              "    const confirmImport = vi.fn<(rows: EditableScheduleImportRow[]) => Promise<{ added: number; removed: number }>>(async () => ({ added: 1, removed: 0 }))\n    renderDialog({ importScreenshots, confirmImport })\n    await user.upload(screen.getByLabelText('Choose schedule screenshots'), scheduleFile())\n    await user.click(screen.getByRole('button', { name: /^Analyze screenshots?$/ }))\n\n    expect(screen.getByRole('progressbar', { name: 'AI screenshot analysis progress' })).toBeInTheDocument()\n    expect(screen.getByText('AI is analyzing your screenshots…')).toBeInTheDocument()\n\n    finishImport?.(importResult())",
              "    const confirmImport = vi.fn<(rows: EditableScheduleImportRow[]) => Promise<{ added: number; removed: number }>>(async () => ({ added: 1, removed: 0 }))\n    const loadUiSettings = vi.fn(async () => ({ progress_bar_duration_ms: 1000 }))\n    renderDialog({ importScreenshots, confirmImport, loadUiSettings })\n    await waitFor(() => expect(loadUiSettings).toHaveBeenCalledTimes(1))\n    await user.upload(screen.getByLabelText('Choose schedule screenshots'), scheduleFile())\n    await user.click(screen.getByRole('button', { name: /^Analyze screenshots?$/ }))\n\n    expect(screen.getByRole('progressbar', { name: 'AI screenshot analysis progress' })).toBeInTheDocument()\n    expect(screen.getByText('AI is analyzing your screenshots…')).toBeInTheDocument()\n    await act(async () => { await new Promise((resolve) => window.setTimeout(resolve, 1100)) })\n    expect(screen.queryByText('Checking the schedule again…')).not.toBeInTheDocument()\n    expect(screen.getByText('AI is analyzing your screenshots…')).toBeInTheDocument()\n\n    finishImport?.(importResult())",
          )

          add_class_test = """

  it('submits Full Year Lunch for expansion into both semester enrollments', async () => {
    const user = userEvent.setup()
    renderDialog()
    await user.click(screen.getByRole('button', { name: 'Create a new class' }))
    await user.click(screen.getByRole('button', { name: 'Lunch - NASH' }))
    expect(screen.getByText('Full Year adds matching Semester 1 and Semester 2 lunch entries at this period.')).toBeInTheDocument()
    await user.selectOptions(screen.getByRole('combobox', { name: 'Academic term' }), 'full_year')
    await user.selectOptions(screen.getByRole('combobox', { name: 'Period' }), '8')
    await user.type(screen.getByRole('textbox', { name: /^Teacher Last Name/ }), 'Cafe')
    await user.click(screen.getByRole('button', { name: 'Create and add class' }))

    await waitFor(() => expect(mocks.createClassAndEnroll).toHaveBeenCalledWith(expect.objectContaining({
      courseNameId: 'course-lunch',
      term: 'full_year',
      meetingSlots: [{ day_type: 'A', period_number: 8 }, { day_type: 'B', period_number: 8 }],
    })))
  })
"""
          replace_once(
              'src/components/schedule/AddClassDialog.test.tsx',
              "\n  it('edits a student-specific Gym pattern on the existing shared class', async () => {",
              add_class_test + "\n  it('edits a student-specific Gym pattern on the existing shared class', async () => {",
          )

          migration = r"""-- A full-year lunch choice represents attendance in both semester rosters.
-- Keep the public API stable while expanding that one choice into two atomic
-- semester-specific enrollments at the same period.

alter function private.enroll_in_class(uuid, public.academic_term, boolean, jsonb)
rename to enroll_in_class_without_full_year_lunch;

alter function private.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean)
rename to create_class_and_enroll_without_full_year_lunch;

alter function private.replace_enrollment(uuid, uuid, public.academic_term, boolean, jsonb)
rename to replace_enrollment_without_full_year_lunch;

create or replace function private.create_class_and_enroll(
  input_course_name_id uuid,
  input_new_course_name text,
  input_teacher_last_name text,
  input_term public.academic_term,
  input_is_double boolean,
  input_meeting_slots jsonb,
  confirmed_no_course_match boolean
)
returns uuid
language plpgsql
volatile
security definer
set search_path = ''
as $$
declare
  selected_policy public.course_term_policy;
  semester_one_enrollment_id uuid;
begin
  if input_course_name_id is not null then
    select course_name.term_policy
    into selected_policy
    from public.course_names course_name
    where course_name.id = input_course_name_id
      and course_name.status = 'active';
  end if;

  if selected_policy = 'lunch' and input_term = 'full_year' then
    semester_one_enrollment_id := private.create_class_and_enroll_without_full_year_lunch(
      input_course_name_id,
      input_new_course_name,
      input_teacher_last_name,
      'semester_1',
      input_is_double,
      input_meeting_slots,
      confirmed_no_course_match
    );
    perform private.create_class_and_enroll_without_full_year_lunch(
      input_course_name_id,
      input_new_course_name,
      input_teacher_last_name,
      'semester_2',
      input_is_double,
      input_meeting_slots,
      confirmed_no_course_match
    );
    return semester_one_enrollment_id;
  end if;

  return private.create_class_and_enroll_without_full_year_lunch(
    input_course_name_id,
    input_new_course_name,
    input_teacher_last_name,
    input_term,
    input_is_double,
    input_meeting_slots,
    confirmed_no_course_match
  );
end;
$$;

create or replace function private.enroll_in_class(
  target_class_id uuid,
  target_term public.academic_term,
  allow_conflict boolean default false,
  target_slots jsonb default null
)
returns uuid
language plpgsql
volatile
security definer
set search_path = ''
as $$
declare
  selected_policy public.course_term_policy;
  selected_course_name_id uuid;
  selected_teacher_last_name text;
  resolved_slots jsonb;
  semester_one_enrollment_id uuid;
begin
  select course_name.term_policy,
         class_record.course_name_id,
         class_record.teacher_last_name
  into selected_policy, selected_course_name_id, selected_teacher_last_name
  from public.classes class_record
  join public.course_names course_name on course_name.id = class_record.course_name_id
  where class_record.id = target_class_id
    and class_record.status = 'active'
    and course_name.status = 'active';

  if selected_policy = 'lunch' and target_term = 'full_year' then
    resolved_slots := coalesce(target_slots, private.class_slots_json(target_class_id));
    semester_one_enrollment_id := private.create_class_and_enroll_without_full_year_lunch(
      selected_course_name_id,
      null,
      selected_teacher_last_name,
      'semester_1',
      false,
      resolved_slots,
      false
    );
    perform private.create_class_and_enroll_without_full_year_lunch(
      selected_course_name_id,
      null,
      selected_teacher_last_name,
      'semester_2',
      false,
      resolved_slots,
      false
    );
    return semester_one_enrollment_id;
  end if;

  return private.enroll_in_class_without_full_year_lunch(
    target_class_id,
    target_term,
    allow_conflict,
    target_slots
  );
end;
$$;

create or replace function private.replace_enrollment(
  target_enrollment_id uuid,
  replacement_class_id uuid,
  replacement_term public.academic_term,
  allow_conflict boolean default false,
  replacement_slots jsonb default null
)
returns uuid
language plpgsql
volatile
security definer
set search_path = ''
as $$
declare
  replacement_policy public.course_term_policy;
begin
  select course_name.term_policy
  into replacement_policy
  from public.classes class_record
  join public.course_names course_name on course_name.id = class_record.course_name_id
  where class_record.id = replacement_class_id
    and class_record.status = 'active'
    and course_name.status = 'active';

  if replacement_policy = 'lunch' and replacement_term = 'full_year' then
    perform private.remove_enrollment(target_enrollment_id);
    return private.enroll_in_class(
      replacement_class_id,
      replacement_term,
      allow_conflict,
      replacement_slots
    );
  end if;

  return private.replace_enrollment_without_full_year_lunch(
    target_enrollment_id,
    replacement_class_id,
    replacement_term,
    allow_conflict,
    replacement_slots
  );
end;
$$;

create or replace function public.enroll_in_class(
  p_class_id uuid,
  p_academic_term public.academic_term,
  p_allow_conflict boolean default false,
  p_meeting_slots jsonb default null
)
returns uuid
language sql
volatile
security invoker
set search_path = ''
as $$
  select private.enroll_in_class(
    p_class_id,
    p_academic_term,
    p_allow_conflict,
    p_meeting_slots
  );
$$;

create or replace function public.create_class_and_enroll(
  p_course_name_id uuid,
  p_new_course_name text,
  p_teacher_last_name text,
  p_academic_term public.academic_term,
  p_is_double_period boolean,
  p_meeting_slots jsonb,
  p_confirmed_no_course_match boolean
)
returns uuid
language sql
volatile
security invoker
set search_path = ''
as $$
  select private.create_class_and_enroll(
    p_course_name_id,
    p_new_course_name,
    p_teacher_last_name,
    p_academic_term,
    p_is_double_period,
    p_meeting_slots,
    p_confirmed_no_course_match
  );
$$;

create or replace function public.replace_enrollment(
  p_enrollment_id uuid,
  p_new_class_id uuid,
  p_academic_term public.academic_term,
  p_allow_conflict boolean default false,
  p_meeting_slots jsonb default null
)
returns uuid
language sql
volatile
security invoker
set search_path = ''
as $$
  select private.replace_enrollment(
    p_enrollment_id,
    p_new_class_id,
    p_academic_term,
    p_allow_conflict,
    p_meeting_slots
  );
$$;

revoke all on function private.enroll_in_class_without_full_year_lunch(uuid, public.academic_term, boolean, jsonb) from public, anon, authenticated;
revoke all on function private.create_class_and_enroll_without_full_year_lunch(uuid, text, text, public.academic_term, boolean, jsonb, boolean) from public, anon, authenticated;
revoke all on function private.replace_enrollment_without_full_year_lunch(uuid, uuid, public.academic_term, boolean, jsonb) from public, anon, authenticated;
revoke all on function private.enroll_in_class(uuid, public.academic_term, boolean, jsonb) from public, anon;
revoke all on function private.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean) from public, anon;
revoke all on function private.replace_enrollment(uuid, uuid, public.academic_term, boolean, jsonb) from public, anon;
grant execute on function private.enroll_in_class(uuid, public.academic_term, boolean, jsonb) to authenticated;
grant execute on function private.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean) to authenticated;
grant execute on function private.replace_enrollment(uuid, uuid, public.academic_term, boolean, jsonb) to authenticated;

revoke all on function public.enroll_in_class(uuid, public.academic_term, boolean, jsonb) from public, anon;
revoke all on function public.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean) from public, anon;
revoke all on function public.replace_enrollment(uuid, uuid, public.academic_term, boolean, jsonb) from public, anon;
grant execute on function public.enroll_in_class(uuid, public.academic_term, boolean, jsonb) to authenticated;
grant execute on function public.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean) to authenticated;
grant execute on function public.replace_enrollment(uuid, uuid, public.academic_term, boolean, jsonb) to authenticated;

comment on function public.enroll_in_class(uuid, public.academic_term, boolean, jsonb) is
  'Enrolls the caller in a class; a full-year lunch request atomically creates Semester 1 and Semester 2 lunch enrollments.';
comment on function public.create_class_and_enroll(uuid, text, text, public.academic_term, boolean, jsonb, boolean) is
  'Creates or reuses class sections and expands a full-year lunch into Semester 1 and Semester 2 enrollments.';
"""
          Path('supabase/migrations/20260723220000_full_year_lunch_semester_enrollments.sql').write_text(migration)

          database_test = r"""begin;
