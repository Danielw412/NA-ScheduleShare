name: Run import size and special teacher fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
  VITE_SCHEDULE_SHARE_BASE_URL: https://schedule-api.naclubs.net

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/import-size-special-teachers
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Apply changes from one-time patch definition
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-import-size-special-teachers-once.yml').read_text()
          marker = "python - <<'PY'\n"
          block = source.split(marker, 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          strict = "if text.count(old) != 1:\n    raise SystemExit('Could not update teacher input')\ntext = text.replace(old, new)"
          tolerant = "if text.count(old) == 1:\n    text = text.replace(old, new)"
          if strict not in script:
              raise SystemExit('Could not find teacher-input patch guard')
          script = script.replace(strict, tolerant)
          Path('/tmp/apply_changes.py').write_text(script + '\n')
          PY
          python /tmp/apply_changes.py
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/schedule/AddClassDialog.tsx')
          text = path.read_text()
          old_input = '<input required maxLength={120} value={teacherLastName} onChange={(event) => setTeacherLastName(event.target.value)} aria-describedby="teacher-last-name-help" />'
          new_input = '<input required={!teacherIsNotApplicable} disabled={teacherIsNotApplicable} maxLength={120} value={effectiveTeacherLastName} onChange={(event) => setTeacherLastName(event.target.value)} aria-describedby="teacher-last-name-help" />'
          old_help = '<small id="teacher-last-name-help" className="field-help">Enter only the teacher’s last name. For example, enter Smith instead of Joe Smith.</small>'
          new_help = '<small id="teacher-last-name-help" className="field-help">{teacherIsNotApplicable ? \'Lunch and Study Hall always use N/A for the teacher.\' : \'Enter only the teacher’s last name. For example, enter Smith instead of Joe Smith.\'}</small>'
          if new_input not in text:
              if text.count(old_input) != 1:
                  raise SystemExit(f'Expected one teacher input, found {text.count(old_input)}')
              text = text.replace(old_input, new_input)
          if new_help not in text:
              if text.count(old_help) != 1:
                  raise SystemExit(f'Expected one teacher help line, found {text.count(old_help)}')
              text = text.replace(old_help, new_help)
          path.write_text(text)

          core_test = Path('supabase/functions/schedule-import/core.test.ts')
          core_text = core_test.read_text()
          old_size = 'new Uint8Array(5 * 1024 * 1024 + 1)'
          new_size = 'new Uint8Array(10 * 1024 * 1024 + 1)'
          if core_text.count(old_size) != 1:
              raise SystemExit(f'Expected one oversized-image test, found {core_text.count(old_size)}')
          core_test.write_text(core_text.replace(old_size, new_size))
          PY
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:function
      - run: pnpm test:worker
      - run: pnpm build
      - name: Start local Supabase
        run: pnpm exec supabase start
      - name: Run database tests
        shell: bash
        run: pnpm test:privacy || { pnpm exec supabase stop --no-backup; pnpm exec supabase start; pnpm test:privacy; }
      - name: Commit tested changes
        shell: bash
        run: |
          rm .github/workflows/apply-import-size-special-teachers-once.yml
          rm .github/workflows/run-import-size-special-teachers-pr.yml
          rm -f .github/workflows/diagnose-import-size-special-teachers.yml .github/workflows/diagnose-import-size-special-teachers-v2.yml .github/workflows/diagnose-function-tests.yml .github/workflows/diagnose-database-tests.yml patch-error.txt patch-error-v2.txt function-test-error.txt database-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Increase import size and normalize special course teachers"
          git push origin HEAD:fix/import-size-special-teachers
