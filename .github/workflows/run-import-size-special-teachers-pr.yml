name: Run import size and special teacher fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
  VITE_SCHEDULE_SHARE_BASE_URL: https://schedule-api.naclubs.net

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/import-size-special-teachers
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Apply changes from one-time patch definition
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-import-size-special-teachers-once.yml').read_text()
          marker = "python - <<'PY'\n"
          block = source.split(marker, 1)[1].split("\n          PY", 1)[0]
          script = textwrap.dedent(block)
          Path('/tmp/apply_changes.py').write_text(script)
          PY
          python /tmp/apply_changes.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:function
      - run: pnpm test:worker
      - run: pnpm build
      - name: Start local Supabase
        run: pnpm exec supabase start
      - name: Run database tests
        run: pnpm test:privacy
      - name: Commit tested changes
        shell: bash
        run: |
          rm .github/workflows/apply-import-size-special-teachers-once.yml
          rm .github/workflows/run-import-size-special-teachers-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Increase import size and normalize special course teachers"
          git push origin HEAD:fix/import-size-special-teachers
